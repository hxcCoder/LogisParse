name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: logisparse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalar requirements.txt si existe
          if [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          elif [ -f "../requirements.txt" ]; then
            python -m pip install -r ../requirements.txt
          fi
          # Forzamos la instalación de las herramientas de desarrollo, incluyendo pydantic
          # para que mypy pueda cargar el plugin pydantic.mypy
          python -m pip install pydantic ruff mypy pytest pytest-cov aiosqlite

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy app

      - name: Test with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: ci-secret-key-with-enough-length
          OPENAI_API_KEY: ""
        run: pytest -q --cov=app --cov-branch --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml